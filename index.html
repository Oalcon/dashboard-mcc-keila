
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard Google Ads - MCC</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --primary: #2563eb;
                --bg: #f8fafc;
                --card-bg: #ffffff;
                --text: #1e293b;
                --text-light: #64748b;
                --border: #e2e8f0;
                --gold: #d4af37;
            }
            body {
                font-family: 'Inter', sans-serif;
                background-color: var(--bg);
                color: var(--text);
                margin: 0;
                padding: 0;
            }
            header {
                background-color: #1e293b;
                color: white;
                padding: 20px 40px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 4px solid var(--gold);
            }
            header h1 {
                margin: 0;
                font-size: 1.5rem;
            }
            .tabs {
                display: flex;
                background-color: white;
                border-bottom: 1px solid var(--border);
                padding: 0 40px;
            }
            .tab-btn {
                padding: 15px 25px;
                border: none;
                background: none;
                cursor: pointer;
                font-size: 1rem;
                font-weight: 600;
                color: var(--text-light);
                border-bottom: 3px solid transparent;
            }
            .tab-btn.active {
                color: var(--primary);
                border-bottom-color: var(--primary);
            }
            .container {
                padding: 40px;
                max-width: 1400px;
                margin: 0 auto;
            }
            .tab-content {
                display: none;
            }
            .tab-content.active {
                display: block;
            }
            .controls {
                margin-bottom: 30px;
                display: flex;
                align-items: center;
                gap: 15px;
            }
            .controls select {
                padding: 10px 15px;
                font-size: 1rem;
                border: 1px solid var(--border);
                border-radius: 6px;
                min-width: 300px;
            }
            .kpi-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
            }
            .kpi-card {
                background-color: var(--card-bg);
                border: 1px solid var(--border);
                border-top: 4px solid var(--gold);
                border-radius: 8px;
                padding: 20px;
                box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
                text-align: center;
            }
            .kpi-card h3 {
                margin: 0 0 10px 0;
                font-size: 0.85rem;
                color: var(--text-light);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .kpi-card p {
                margin: 0;
                font-size: 1.8rem;
                font-weight: 700;
                color: var(--text);
            }
            .chart-container {
                background-color: var(--card-bg);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            }
            .charts-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
        </style>
    </head>
    <body>

", "impressions": 150, "clicks": 8, "cost": 29.324144, "conversions": 1.0}, {"date": "2026-06-07", "impressions": 92, "clicks": 8, "cost": 26.648836, "conversions": 0.0}, {"date": "2026-06-08", "impressions": 125, "clicks": 5, "cost": 15.109025, "conversions": 0.0}, {"date": "2026-06-09", "impressions": 174, "clicks": 6, "cost": 15.093838, "conversions": 0.0}, {"date": "2026-06-10", "impressions": 113, "clicks": 7, "cost": 15.545216, "conversions": 0.0}, {"date": "2026-06-11", "impressions": 150, "clicks": 8, "cost": 16.400468, "conversions": 0.0}, {"date": "2026-06-12", "impressions": 111, "clicks": 0, "cost": 0.0, "conversions": 0.0}, {"date": "2026-06-13", "impressions": 245, "clicks": 6, "cost": 25.137446, "conversions": 0.0}, {"date": "2026-06-14", "impressions": 113, "clicks": 4, "cost": 17.02, "conversions": 0.0}, {"date": "2026-06-15", "impressions": 206, "clicks": 6, "cost": 23.320146, "conversions": 0.0}, {"date": "2026-06-16", "impressions": 134, "clicks": 5, "cost": 16.816967, "conversions": 0.0}, {"date": "2026-06-17", "impressions": 91, "clicks": 7, "cost": 19.04, "conversions": 0.0}, {"date": "2026-06-18", "impressions": 618, "clicks": 8, "cost": 17.88, "conversions": 0.0}, {"date": "2026-06-19", "impressions": 510, "clicks": 7, "cost": 12.91, "conversions": 0.0}, {"date": "2026-06-20", "impressions": 665, "clicks": 4, "cost": 7.62, "conversions": 0.0}, {"date": "2026-06-21", "impressions": 328, "clicks": 7, "cost": 16.7, "conversions": 0.0}], "totals": {"impressions": 5562, "clicks": 164, "cost": 464.87463899999995, "conversions": 1.0, "ctr": 2.948579647608774, "cpc": 2.834601457317073, "cvr": 0.6097560975609756, "cpa": 464.87463899999995}}]}};
            let charts = {};

            function formatCurrency(val) {
                return 'R$ ' + val.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            }
            function formatNumber(val) {
                return val.toLocaleString('pt-BR');
            }
            function formatPercent(val) {
                return val.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '%';
            }

            function initTab(period) {
                const container = document.getElementById(period);
                if(db[period].data.length === 0) {
                    container.innerHTML = '<p>Nenhum dado encontrado neste período.</p>';
                    return;
                }
                
                let selectHtml = '<div class="controls"><label><strong>Selecione a Campanha:</strong></label><select id="sel_' + period + '" onchange="renderCampaign(\'' + period + '\')">';
                db[period].data.forEach((camp, index) => {
                    selectHtml += `<option value="${index}">${camp.name}</option>`;
                });
                selectHtml += '</select></div>';
                
                let kpiHtml = `
                    <div class="kpi-grid">
                        <div class="kpi-card"><h3>Impressões</h3><p id="kpi_impr_${period}">0</p></div>
                        <div class="kpi-card"><h3>Cliques Totais</h3><p id="kpi_clicks_${period}">0</p></div>
                        <div class="kpi-card"><h3>Custo Total</h3><p id="kpi_cost_${period}">0</p></div>
                        <div class="kpi-card"><h3>CPC Médio</h3><p id="kpi_cpc_${period}">0</p></div>
                        <div class="kpi-card"><h3>CTR</h3><p id="kpi_ctr_${period}">0</p></div>
                        <div class="kpi-card"><h3>Conversões</h3><p id="kpi_conv_${period}">0</p></div>
                        <div class="kpi-card"><h3>Taxa Conv. (CVR)</h3><p id="kpi_cvr_${period}">0</p></div>
                        <div class="kpi-card"><h3>CPA (Custo p/ Lead)</h3><p id="kpi_cpa_${period}">0</p></div>
                    </div>
                `;
                
                let chartsHtml = `
                    <div class="chart-container" style="height: 500px;">
                        <canvas id="chart_combined_${period}" style="height: 100%; width: 100%;"></canvas>
                    </div>
                `;
                
                container.innerHTML = selectHtml + kpiHtml + chartsHtml;
                renderCampaign(period);
            }

            function renderCampaign(period) {
                const sel = document.getElementById('sel_' + period);
                if(!sel) return;
                const camp = db[period].data[sel.value];
                const t = camp.totals;
                
                document.getElementById(`kpi_impr_${period}`).innerText = formatNumber(t.impressions);
                document.getElementById(`kpi_clicks_${period}`).innerText = formatNumber(t.clicks);
                document.getElementById(`kpi_cost_${period}`).innerText = formatCurrency(t.cost);
                document.getElementById(`kpi_cpc_${period}`).innerText = formatCurrency(t.cpc);
                document.getElementById(`kpi_ctr_${period}`).innerText = formatPercent(t.ctr);
                document.getElementById(`kpi_conv_${period}`).innerText = formatNumber(t.conversions);
                document.getElementById(`kpi_cvr_${period}`).innerText = formatPercent(t.cvr);
                document.getElementById(`kpi_cpa_${period}`).innerText = formatCurrency(t.cpa);
                
                // Agrupamento por semana
                const weeklyMap = {};
                const orderedWeeks = [];
                camp.daily.forEach(d => {
                    const [year, month, day] = d.date.split('-');
                    const dateObj = new Date(year, month - 1, day);
                    const dayOfWeek = dateObj.getDay(); 
                    const diff = dateObj.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
                    const monday = new Date(dateObj.setDate(diff));
                    const weekStr = monday.getDate().toString().padStart(2, '0') + '/' + (monday.getMonth() + 1).toString().padStart(2, '0');
                    
                    if(!weeklyMap[weekStr]) {
                        weeklyMap[weekStr] = { impressions: 0, clicks: 0, cost: 0, conversions: 0 };
                        orderedWeeks.push(weekStr);
                    }
                    weeklyMap[weekStr].impressions += d.impressions;
                    weeklyMap[weekStr].clicks += d.clicks;
                    weeklyMap[weekStr].cost += d.cost;
                    weeklyMap[weekStr].conversions += d.conversions;
                });
                
                const labels = orderedWeeks.map(w => 'Sem. ' + w);
                const dataImpr = orderedWeeks.map(w => weeklyMap[w].impressions);
                const dataClicks = orderedWeeks.map(w => weeklyMap[w].clicks);
                const dataCost = orderedWeeks.map(w => weeklyMap[w].cost);
                const dataConv = orderedWeeks.map(w => weeklyMap[w].conversions);
                
                if(charts[`chart_combined_${period}`]) charts[`chart_combined_${period}`].destroy();
                
                const ctx = document.getElementById(`chart_combined_${period}`).getContext('2d');
                charts[`chart_combined_${period}`] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {label: 'Impressões', data: dataImpr, borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.2)', fill: true, tension: 0.3, yAxisID: 'y'},
                            {label: 'Custo Diário (R$)', data: dataCost, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.2)', fill: true, tension: 0.3, yAxisID: 'y'},
                            {label: 'Cliques', data: dataClicks, borderColor: '#3b82f6', backgroundColor: '#3b82f6', tension: 0.3, yAxisID: 'y1'},
                            {label: 'Conversões', data: dataConv, borderColor: '#10b981', backgroundColor: '#10b981', tension: 0.3, yAxisID: 'y1'}
                        ]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: { 
                            title: { display: true, text: 'Visão Geral (Métricas por Semana)' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.parsed.y !== null) {
                                            if (label.includes('Custo')) {
                                                label += new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(context.parsed.y);
                                            } else {
                                                label += context.parsed.y;
                                            }
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                type: 'linear',
                                display: true,
                                position: 'left',
                                title: { display: true, text: 'Impressões / Custo' },
                                min: 0
                            },
                            y1: {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                title: { display: true, text: 'Cliques / Conversões' },
                                grid: { drawOnChartArea: false },
                                min: 0
                            }
                        }
                    }
                });
            }

            function switchTab(period) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                event.target.classList.add('active');
                document.getElementById(period).classList.add('active');
                
                // Re-render to fix chart sizing issues in hidden divs
                renderCampaign(period);
            }

            // Initialize all tabs
            initTab('30_days');
            initTab('60_days');
        </script>
    </body>
    </html>
