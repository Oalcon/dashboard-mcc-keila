        <style>
            :root {
                --primary: #2563eb;
                --bg: #f8fafc;
                --card-bg: #ffffff;
                --text: #1e293b;
                --text-light: #64748b;
                --border: #e2e8f0;
                --gold: #d4af37;
            }
            body {
                font-family: 'Inter', sans-serif;
                background-color: var(--bg);
                color: var(--text);
                margin: 0;
                padding: 0;
            }
            header {
                background-color: #1e293b;
                color: white;
                padding: 20px 40px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 4px solid var(--gold);
            }
            header h1 {
                margin: 0;
                font-size: 1.5rem;
            }
            .tabs {
                display: flex;
                flex-wrap: wrap;
                background-color: white;
                border-bottom: 1px solid var(--border);
                padding: 0 40px;
            }
            .tab-btn {
                padding: 15px 25px;
                border: none;
                background: none;
                cursor: pointer;
                font-size: 1rem;
                font-weight: 600;
                color: var(--text-light);
                border-bottom: 3px solid transparent;
            }
            .tab-btn.active {
                color: var(--primary);
                border-bottom-color: var(--primary);
            }
            .container {
                padding: 40px;
                max-width: 1400px;
                margin: 0 auto;
            }
            .controls {
                margin-bottom: 30px;
                display: flex;
                align-items: center;
                gap: 15px;
            }
            
            .preset-ranges {
                display: flex;
                gap: 8px;
                margin-left: 15px;
            }
            .preset-btn {
                padding: 6px 12px;
                font-size: 0.85rem;
                background-color: var(--bg);
                border: 1px solid var(--border);
                border-radius: 4px;
                cursor: pointer;
                color: var(--text-light);
                font-weight: 600;
                transition: all 0.2s;
            }
            .preset-btn:hover {
                background-color: var(--primary);
                color: white;
                border-color: var(--primary);
            }
            .date-picker-input {
                padding: 10px 15px;
                font-size: 1rem;
                border: 1px solid var(--border);
                border-radius: 6px;
                min-width: 250px;
                background-color: white;
                cursor: pointer;
                background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%2364748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>');
                background-repeat: no-repeat;
                background-position: right 15px center;
            }
            .kpi-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
            }
            .kpi-card {
                background-color: var(--card-bg);
                border: 1px solid var(--border);
                border-top: 4px solid var(--gold);
                border-radius: 8px;
                padding: 20px;
                box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
                text-align: center;
            }
            .kpi-card h3 {
                margin: 0 0 10px 0;
                font-size: 0.85rem;
                color: var(--text-light);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .kpi-card p {
                margin: 0;
                font-size: 1.8rem;
                font-weight: 700;
                color: var(--text);
            }
            .chart-container {
                background-color: var(--card-bg);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            }
        </style>
    </head>
    <body>

                    <button class="preset-btn" onclick="setPresetRange(14)">14 Dias</button>
                    <button class="preset-btn" onclick="setPresetRange(30)">30 Dias</button>
                </div>
            </div>
            
            <div id="campaign_content"></div>
        </div>

            let charts = {};
            let activeCampId = db.length > 0 ? db[0].id : null;
            
            // Default dates: last 30 days
            let currentDate = new Date();
            let startDate = new Date();
            startDate.setDate(currentDate.getDate() - 30);
            
            let currentStartStr = startDate.toISOString().split('T')[0];
            let currentEndStr = currentDate.toISOString().split('T')[0];

            function formatCurrency(val) { return 'R$ ' + val.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
            function formatNumber(val) { return val.toLocaleString('pt-BR'); }
            function formatPercent(val) { return val.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '%'; }

            function initUI() {
                if(db.length === 0) {
                    document.getElementById('content-container').innerHTML = "<h3>Nenhum dado encontrado nos últimos 180 dias.</h3>";
                    return;
                }

                const tabsContainer = document.getElementById('tabs-container');
                db.forEach((camp, index) => {
                    const btn = document.createElement('button');
                    btn.className = `tab-btn ${index === 0 ? 'active' : ''}`;
                    btn.innerText = camp.name;
                    btn.onclick = (e) => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        activeCampId = camp.id;
                        renderDashboard();
                    };
                    tabsContainer.appendChild(btn);
                });
                
                window.litepickerInstance = new Litepicker({
                    element: document.getElementById('date_picker'),
                    singleMode: false,
                    format: 'DD/MM/YYYY',
                    lang: 'pt-BR',
                    startDate: startDate,
                    endDate: currentDate,
                    setup: (picker) => {
                        picker.on('selected', (date1, date2) => {
                            // Convert Litepicker dates to YYYY-MM-DD for filtering
                            const d1 = date1.dateInstance;
                            const d2 = date2.dateInstance;
                            
                            // Handle timezone offset to ensure exact local date is mapped to YYYY-MM-DD
                            const tz1 = new Date(d1.getTime() - (d1.getTimezoneOffset() * 60000));
                            const tz2 = new Date(d2.getTime() - (d2.getTimezoneOffset() * 60000));
                            
                            currentStartStr = tz1.toISOString().split('T')[0];
                            currentEndStr = tz2.toISOString().split('T')[0];
                            
                            renderDashboard();
                        });
                    }
                });
                
                renderDashboard();
            }

            function setPresetRange(days) {
                let end = new Date();
                let start = new Date();
                start.setDate(end.getDate() - days);
                
                if (window.litepickerInstance) {
                    window.litepickerInstance.setDateRange(start, end);
                }
                
                const tz1 = new Date(start.getTime() - (start.getTimezoneOffset() * 60000));
                const tz2 = new Date(end.getTime() - (end.getTimezoneOffset() * 60000));
                currentStartStr = tz1.toISOString().split('T')[0];
                currentEndStr = tz2.toISOString().split('T')[0];
                
                renderDashboard();
            }

            function renderDashboard() {
                if(!activeCampId) return;
                
                const camp = db.find(c => c.id === activeCampId);
                
                // Filter daily data
                const filteredData = camp.daily.filter(d => d.date >= currentStartStr && d.date <= currentEndStr);
                
                // Calculate totals
                let t_impr = 0, t_clicks = 0, t_cost = 0, t_conv = 0;
                filteredData.forEach(d => {
                    t_impr += d.impressions;
                    t_clicks += d.clicks;
                    t_cost += d.cost;
                    t_conv += d.conversions;
                });
                
                let t_ctr = t_impr > 0 ? (t_clicks / t_impr * 100) : 0;
                let t_cpc = t_clicks > 0 ? (t_cost / t_clicks) : 0;
                let t_cvr = t_clicks > 0 ? (t_conv / t_clicks * 100) : 0;
                let t_cpa = t_conv > 0 ? (t_cost / t_conv) : 0;
                
                // Render KPIs
                let kpiHtml = `
                    <div class="kpi-grid">
                        <div class="kpi-card"><h3>Impressões</h3><p>${formatNumber(t_impr)}</p></div>
                        <div class="kpi-card"><h3>Cliques Totais</h3><p>${formatNumber(t_clicks)}</p></div>
                        <div class="kpi-card"><h3>Custo Total</h3><p>${formatCurrency(t_cost)}</p></div>
                        <div class="kpi-card"><h3>CPC Médio</h3><p>${formatCurrency(t_cpc)}</p></div>
                        <div class="kpi-card"><h3>CTR</h3><p>${formatPercent(t_ctr)}</p></div>
                        <div class="kpi-card"><h3>Conversões</h3><p>${formatNumber(t_conv)}</p></div>
                        <div class="kpi-card"><h3>Taxa Conv. (CVR)</h3><p>${formatPercent(t_cvr)}</p></div>
                        <div class="kpi-card"><h3>CPA (Custo p/ Lead)</h3><p>${formatCurrency(t_cpa)}</p></div>
                    </div>
                    <div class="chart-container" style="height: 500px;">
                        <canvas id="chart_combined" style="height: 100%; width: 100%;"></canvas>
                    </div>
                `;
                
                document.getElementById('campaign_content').innerHTML = kpiHtml;
                
                // Render Chart (group by day or week depending on range)
                const labels = [];
                const dataImpr = [];
                const dataClicks = [];
                const dataCost = [];
                const dataConv = [];
                
                // For long periods, we should group by week, but grouping by day is fine up to 60 days
                // Let's stick to daily grouping for simplicity in the line chart to match exact dates chosen
                filteredData.forEach(d => {
                    const [y, m, day] = d.date.split('-');
                    labels.push(`${day}/${m}`);
                    dataImpr.push(d.impressions);
                    dataClicks.push(d.clicks);
                    dataCost.push(d.cost);
                    dataConv.push(d.conversions);
                });
                
                if(charts['main']) charts['main'].destroy();
                
                const ctx = document.getElementById(`chart_combined`).getContext('2d');
                charts['main'] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {label: 'Impressões', data: dataImpr, borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.2)', fill: true, tension: 0.3, yAxisID: 'y'},
                            {label: 'Custo Diário (R$)', data: dataCost, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.2)', fill: true, tension: 0.3, yAxisID: 'y'},
                            {label: 'Cliques', data: dataClicks, borderColor: '#3b82f6', backgroundColor: '#3b82f6', tension: 0.3, yAxisID: 'y1'},
                            {label: 'Conversões', data: dataConv, borderColor: '#10b981', backgroundColor: '#10b981', tension: 0.3, yAxisID: 'y1'}
                        ]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: { 
                            title: { display: true, text: 'Visão Geral Diária no Período Selecionado' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        let label = context.dataset.label || '';
                                        if (label) label += ': ';
                                        if (context.parsed.y !== null) {
                                            if (label.includes('Custo')) {
                                                label += new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(context.parsed.y);
                                            } else {
                                                label += context.parsed.y;
                                            }
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        scales: {
                            y: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Impressões / Custo' }, min: 0 },
                            y1: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Cliques / Conversões' }, grid: { drawOnChartArea: false }, min: 0 }
                        }
                    }
                });
            }
            
            document.addEventListener("DOMContentLoaded", function() {
                initUI();
            });
        </script>
    </body>
    </html>
